<!DOCTYPE html>
<html lang="es-CO">
<head>

<title>Página no encontrada — HGW Colombia</title>
<meta name="robots" content="noindex, follow">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e0d;--bg-light:#141918;--surface:#1a201f;--accent-green:#00ff9d;--accent-purple:#b794f6;--accent-blue:#4fd1ff;--text-primary:#fff;--text-secondary:#a8b3b0;--text-muted:#5a6864;--gradient-1:linear-gradient(135deg,#00ff9d 0%,#00cc7d 100%);--font-display:'Sora',sans-serif;--font-body:'Inter',sans-serif}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 0%,rgba(0,255,157,.06) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(183,148,246,.04) 0%,transparent 50%);pointer-events:none;z-index:0}
h1{font-family:var(--font-display);font-size:clamp(6rem,15vw,12rem);font-weight:800;background:var(--gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:1rem}
h2{font-family:var(--font-display);font-size:clamp(1.5rem,3vw,2.5rem);font-weight:700;margin-bottom:1rem}
p{font-size:1.125rem;color:var(--text-secondary);margin-bottom:2rem;max-width:500px}
.btn{background:var(--gradient-1);color:#0a0e0d;padding:1rem 2.5rem;border-radius:100px;text-decoration:none;font-size:.875rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;display:inline-block;transition:all .3s;box-shadow:0 8px 24px rgba(0,255,157,.3)}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,255,157,.4)}
</style>
</head>
<body>
<div style="position:relative;z-index:1">
<h1>404</h1>
<h2>Página no encontrada</h2>
<p>La página que buscas no existe o fue movida. Pero nuestros productos estrella siguen aquí para ti.</p>
<a href="https://hgwnatural.com" class="btn">Volver al inicio</a>
</div>
</body>
</html>
